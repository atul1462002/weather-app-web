<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>
    <meta name="description"
        content="A beautiful, responsive weather application providing real-time data, 5-day forecast, and dynamic conditions.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for UI icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="light-mode weather-default">

    <div class="app-container glass">
        <div class="loader-container" id="loader">
            <div class="spinner"></div>
        </div>

        <header>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search for a city...">
                <button id="search-btn" title="Search"><i class="fas fa-search"></i></button>
                <button id="location-btn" title="Use My Location"><i class="fas fa-location-crosshairs"></i></button>
            </div>
            <button id="theme-toggle" title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i></button>
        </header>

        <div class="error-message" id="error-message"></div>

        <main id="main-content" class="hidden">
            <section class="current-weather">
                <div class="weather-header">
                    <div class="location-datetime">
                        <h1 id="city-name">--</h1>
                        <p id="date-time">--</p>
                    </div>
                </div>

                <div class="weather-main">
                    <img id="weather-icon" src="weather.png" alt="Weather Icon" class="main-icon">
                    <div class="temp-condition">
                        <h2 id="temperature">--°C</h2>
                        <p id="condition">--</p>
                    </div>
                </div>

                <div class="weather-details grid">
                    <div class="detail-card glass">
                        <i class="fas fa-temperature-half"></i>
                        <div>
                            <p class="label">Feels Like</p>
                            <p id="feels-like" class="value">--°C</p>
                        </div>
                    </div>
                    <div class="detail-card glass">
                        <i class="fas fa-droplet"></i>
                        <div>
                            <p class="label">Humidity</p>
                            <p id="humidity" class="value">--%</p>
                        </div>
                    </div>
                    <div class="detail-card glass">
                        <i class="fas fa-wind"></i>
                        <div>
                            <p class="label">Wind Speed</p>
                            <p id="wind-speed" class="value">-- m/s</p>
                        </div>
                    </div>
                    <div class="detail-card glass">
                        <i class="fas fa-gauge-high"></i>
                        <div>
                            <p class="label">Pressure</p>
                            <p id="pressure" class="value">-- hPa</p>
                        </div>
                    </div>
                    <div class="detail-card glass">
                        <i class="fas fa-eye"></i>
                        <div>
                            <p class="label">Visibility</p>
                            <p id="visibility" class="value">-- km</p>
                        </div>
                    </div>
                    <div class="detail-card glass">
                        <i class="fas fa-sun"></i>
                        <div>
                            <p class="label">Sunrise & Sunset</p>
                            <p id="sun-times" class="value">--:-- / --:--</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="forecast">
                <h3>5-Day Forecast</h3>
                <div class="forecast-container" id="forecast-container">
                    <!-- Forecast items will be injected here via JS -->
                </div>
            </section>
        </main>

        <div id="welcome-message" class="welcome-message">
            <h2>Welcome to WeatherNow</h2>
            <p>Enter a city name or use your location to get started.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
